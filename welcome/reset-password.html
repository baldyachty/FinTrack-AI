<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password - FinTrack AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <a href="index.html" class="nav-logo">
          <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="brand-text">FinTrack <span class="brand-accent">AI</span></span>
        </a>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="hero-animated-bg"></div>
    <div class="hero-particles"></div>
    <div class="auth-container">
      <div class="auth-box">
        <h1 class="auth-title animate-fade-slide-in">New Password</h1>
        <p class="auth-description animate-fade-slide-in delay-1">Secure your account with a new password.</p>
        
        <form class="auth-form animate-fade-slide-in delay-2" id="resetPasswordForm">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" required placeholder="Enter new password">
          </div>

          <div class="form-group">
            <label for="confirmNewPassword">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" required placeholder="Confirm new password">
          </div>
          
          <button type="submit" class="btn btn-primary btn-large btn-block">Update Password</button>
        </form>
        
        <p class="auth-alternative">
          Remembered it? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
  </section>

  <div id="toastContainer" class="toast-container"></div>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.authForms) {
          window.authForms.initHeroParticles();
          // Initialize the reset listener specifically
          const resetForm = document.getElementById('resetPasswordForm');
          if (resetForm) {
              resetForm.addEventListener('submit', (e) => window.authForms.handleResetPassword(e));
          }
      }
    });
  </script>
</body>
</html>
